<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Invoice</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  padding:40px;
}

.card{
  background:white;
  padding:30px;
  border-radius:10px;
  max-width:800px;
  margin:auto;
}

h1{
  margin-top:0;
}

.row{
  margin-bottom:12px;
}

.amount{
  font-size:22px;
  font-weight:bold;
}

.btn{
  background:#1e88e5;
  color:white;
  padding:12px 20px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-right:10px;
  margin-top:20px;
  text-decoration:none;
  display:inline-block;
}

.btn:hover{
  background:#1565c0;
}
</style>
</head>

<body>

<div class="card">

<h1>Invoice</h1>

<div id="invoice">
Loading...
</div>

<a id="payBtn" class="btn" target="_blank" style="display:none">
Pay Invoice
</a>

</div>

<script>

const SUPABASE_URL = "https://yaagobzgozzozibublmj.supabase.co";
const SUPABASE_KEY = "sb_publishable_UTuO6wlERHBzoSnkySHATw_s6T46upe";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const params = new URLSearchParams(window.location.search);
const token = params.get("token");

async function loadInvoice(){

if(!token){
  document.getElementById("invoice").innerHTML =
  "Missing invoice token.";
  return;
}

const { data, error } = await supabase
  .from("invoices")
  .select("*")
  .eq("public_token", token)
  .single();

if(error || !data){
  document.getElementById("invoice").innerHTML =
  "Invoice not found.";
  return;
}

document.getElementById("invoice").innerHTML = `
<div class="row"><b>Invoice #</b> ${data.invoice_no}</div>
<div class="row"><b>Customer</b> ${data.customer_name}</div>
<div class="row"><b>Project</b> ${data.project_name}</div>
<div class="row"><b>Total</b></div>
<div class="amount">$${data.amount}</div>
`;

if(data.payment_link){
  const payBtn = document.getElementById("payBtn");
  payBtn.href = data.payment_link;
  payBtn.style.display = "inline-block";
}

}

loadInvoice();

</script>

</body>
</html>
