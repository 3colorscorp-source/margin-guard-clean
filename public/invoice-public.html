<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#0f8a5f;
      --accent-dark:#0b6b49;
      --soft:#f9fafb;
      --danger:#991b1b;
      --danger-bg:#fee2e2;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:Inter, "Segoe UI", Arial, Helvetica, sans-serif;
      background:#eef2f6;
      color:var(--text);
      padding:32px 16px;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 12px 36px rgba(15,23,42,0.08);
    }

    .topbar{
      padding:24px 28px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
      background:#fff;
    }

    .topbar-main{
      min-width:220px;
      flex:1 1 auto;
    }

    .brand h1{
      margin:0;
      font-size:26px;
      letter-spacing:-0.02em;
      line-height:1.2;
    }

    .brand .sub{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
    }

    .header-title{
      margin-top:8px;
      font-size:14px;
      font-weight:700;
      color:#1f2937;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:14px;
      flex-wrap:wrap;
    }

    .invoice-meta-top > span{
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.08em;
      padding-top:6px;
    }

    .invoice-meta-top > strong{
      font-size:24px;
      font-weight:800;
      line-height:1;
    }

    .invoice-meta{
      display:inline-flex;
      align-items:baseline;
      gap:8px;
    }

    .invoice-inline-label{
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .invoice-inline-no{
      font-size:26px;
      font-weight:800;
      line-height:1;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:10px 14px;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      border:1px solid var(--line);
      background:#f9fafb;
    }

    .status-pill.paid{
      color:#065f46;
      background:#ecfdf5;
      border-color:#a7f3d0;
    }

    .status-pill.partial,
    .status-pill.open{
      color:#92400e;
      background:#fffbeb;
      border-color:#fcd34d;
    }

    .status-pill.overdue{
      color:#991b1b;
      background:#fef2f2;
      border-color:#fecaca;
    }

    .content{
      padding:28px;
    }

    .panel{
      border:1px solid var(--line);
      border-radius:16px;
      padding:20px;
      background:#fff;
      box-shadow:0 1px 0 rgba(15,23,42,0.03);
    }

    .eyebrow{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:10px;
    }

    .small-note{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-bottom:24px;
    }

    .info-list{
      display:grid;
      gap:12px;
    }

    .info-row{
      display:grid;
      grid-template-columns:160px 1fr;
      gap:12px;
      padding-bottom:10px;
      border-bottom:1px dashed var(--line);
    }

    .info-row:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .label{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .value{
      font-size:15px;
      font-weight:600;
      word-break:break-word;
    }

    .summary{
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      margin-bottom:24px;
    }

    .summary-head{
      padding:16px 20px;
      background:#f9fafb;
      border-bottom:1px solid var(--line);
      font-size:15px;
      font-weight:800;
    }

    .summary-body{
      padding:18px 20px;
      display:grid;
      gap:12px;
      background:#fff;
    }

    .sum-row{
      display:flex;
      justify-content:space-between;
      gap:16px;
      font-size:15px;
    }

    .sum-row.total{
      padding-top:12px;
      margin-top:4px;
      border-top:1px solid var(--line);
      font-size:24px;
      font-weight:800;
    }

    .progress-wrap{
      margin-top:14px;
      padding-top:12px;
      border-top:1px dashed var(--line);
    }

    .progress-meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .progress-track{
      width:100%;
      height:10px;
      border-radius:999px;
      background:#e5e7eb;
      overflow:hidden;
    }

    .progress-fill{
      height:100%;
      width:0%;
      background:var(--accent);
      border-radius:999px;
      transition:width .25s ease;
    }

    .last-payment{
      margin-top:10px;
      font-size:13px;
      color:#374151;
      line-height:1.45;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:20px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:180px;
    }

    .btn-primary{
      background:var(--accent);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--accent-dark);
    }

    .btn-secondary{
      background:#fff;
      color:#111827;
      border:1px solid var(--line);
    }

    .notes{
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px 20px;
      background:#fff;
      margin-bottom:24px;
    }

    .notes-title{
      font-size:17px;
      font-weight:800;
      margin-bottom:8px;
      letter-spacing:.02em;
      text-transform:uppercase;
    }

    .notes-text{
      color:#374151;
      font-size:14px;
      line-height:1.6;
      white-space:pre-wrap;
    }

    .payment-panel{
      border:1px solid var(--line);
      border-radius:16px;
      padding:22px 24px;
      margin-bottom:24px;
      background:linear-gradient(180deg,#fafbfc 0%,#fff 45%);
      box-shadow:0 1px 0 rgba(15,23,42,0.04);
    }

    .payment-panel-head{
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
      margin-bottom:12px;
    }

    .payment-panel-body.instructions{
      color:#1f2937;
      font-size:15px;
      line-height:1.65;
      white-space:pre-wrap;
      margin:0;
    }

    .payment-actions{
      margin-top:16px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }

    .payment-panel.muted{
      background:#f9fafb;
      border-style:dashed;
    }

    .payment-placeholder{
      color:var(--muted);
      font-size:14px;
      line-height:1.55;
      margin:0;
      font-style:italic;
    }

    .error{
      color:var(--danger);
      background:var(--danger-bg);
      padding:16px;
      border-radius:14px;
      font-weight:700;
      white-space:pre-wrap;
    }

    .powered-by{
      margin-top:20px;
      font-size:12px;
      opacity:0.65;
      text-align:center;
    }

    @media (max-width: 720px){
      .hero,
      .grid{
        grid-template-columns:1fr;
      }

      .info-row{
        grid-template-columns:1fr;
        gap:4px;
      }

      .content,
      .topbar{
        padding:20px;
      }

      .topbar{
        align-items:flex-start;
      }

      .topbar-right{
        width:100%;
        justify-content:space-between;
      }

      .payment-actions .btn{
        width:100%;
        min-width:0;
      }

      .invoice-inline-no{ font-size:22px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="invoice">Loading...</div>
    </div>
  </div>

  <script>
(function () {
  const TENANT_NAME_FALLBACK = "Invoice";
  const BUSINESS_SUBTITLE = "Service invoice";
  const invoiceBox = document.getElementById("invoice");

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function safeHttpUrl(url) {
    const u = String(url || "").trim();
    return /^https?:\/\//i.test(u) ? u : "";
  }

  function safeAccentColor(hex) {
    const h = String(hex || "").trim();
    return /^#[0-9a-fA-F]{3,8}$/.test(h) ? h : "#0f8a5f";
  }

  function money(value, currency) {
    const cur = currency && String(currency).trim() ? String(currency).trim() : "USD";
    const num = Number(value);
    const n = Number.isFinite(num) ? num : 0;
    try {
      return new Intl.NumberFormat("en-US", { style: "currency", currency: cur }).format(n);
    } catch {
      return `$${n.toFixed(2)}`;
    }
  }

  function displayText(value, fallback) {
    const f = fallback === undefined ? "—" : fallback;
    if (value == null || value === "") return escapeHtml(f);
    return escapeHtml(String(value));
  }

  function invoiceFacts(inv) {
    const contractNum = Number(inv.contract_total);
    const invoiceAmountNum = Number(inv.invoice_amount != null ? inv.invoice_amount : inv.amount);
    const paidNum = Number(inv.paid_to_date != null ? inv.paid_to_date : inv.paid_amount);
    const balanceNum = Number(inv.remaining_balance != null ? inv.remaining_balance : inv.balance_due);
    const contractTotal = Number.isFinite(contractNum) ? contractNum : Number.isFinite(invoiceAmountNum) ? invoiceAmountNum : 0;
    const invoiceAmount = Number.isFinite(invoiceAmountNum) ? invoiceAmountNum : 0;
    const paid = Number.isFinite(paidNum) ? paidNum : 0;
    const balance = Number.isFinite(balanceNum) ? balanceNum : Math.max(contractTotal - paid, 0);
    return { contractTotal, invoiceAmount, paid, balance };
  }

  function normalizedStatus(inv) {
    const facts = invoiceFacts(inv);
    if (facts.balance <= 0) return "Paid";
    if (facts.paid > 0) return "Partial";
    const raw = String(inv.status || "").trim().toLowerCase();
    if (raw === "overdue" || raw === "expired") return "Overdue";
    const due = parseDateOnly(inv.due_date);
    if (due) {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      if (due.getTime() < today && facts.balance > 0) return "Overdue";
    }
    return "Open";
  }

  function statusClassFromLabel(label) {
    const s = String(label || "").toLowerCase();
    if (s === "paid") return "paid";
    if (s === "partial") return "partial";
    if (s === "overdue") return "overdue";
    return "open";
  }

  function parseDateOnly(value) {
    const s = String(value || "").trim();
    const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return null;
    const y = Number(m[1]);
    const mo = Number(m[2]) - 1;
    const d = Number(m[3]);
    if (!Number.isFinite(y) || !Number.isFinite(mo) || !Number.isFinite(d)) return null;
    return new Date(y, mo, d);
  }

  function paymentProgressPercent(inv) {
    const facts = invoiceFacts(inv);
    if (facts.contractTotal <= 0) return facts.paid > 0 ? 100 : 0;
    const pct = (facts.paid / facts.contractTotal) * 100;
    return Math.max(0, Math.min(100, Math.round(pct * 100) / 100));
  }

  function setDocumentTitle(brandName) {
    const t = String(brandName || "").trim();
    document.title = t ? `${t} — Invoice` : "Invoice";
  }

  function showError(message) {
    const msg = escapeHtml(message || "Something went wrong.");
    document.title = "Invoice";
    invoiceBox.innerHTML =
      '<div class="topbar">' +
        '<div class="brand">' +
          "<h1>" + escapeHtml(TENANT_NAME_FALLBACK) + "</h1>" +
          '<div class="sub">' + escapeHtml(BUSINESS_SUBTITLE) + "</div>" +
        "</div>" +
      "</div>" +
      '<div class="content">' +
        '<div class="error">' + msg + "</div>" +
      "</div>" +
      '<p class="powered-by" style="margin:20px 28px 24px;">Powered by Margin Guard</p>';
  }

  function sanitizeInvoice(raw) {
    if (!raw || typeof raw !== "object") return null;
    const o = { ...raw };
    delete o.tenant_id;
    return o;
  }

  function showPanelNotice(kind, message) {
    const node = document.getElementById("invoicePayNotice");
    if (!node) return;
    node.style.display = "block";
    node.className = `notice ${kind || ""}`.trim();
    node.textContent = String(message || "");
  }

  async function loadInvoice() {
    try {
      const token = new URLSearchParams(window.location.search).get("token");
      if (!token || !String(token).trim()) {
        showError("Missing invoice token.");
        return;
      }

      const res = await fetch(
        "/.netlify/functions/get-public-invoice?token=" + encodeURIComponent(String(token).trim())
      );

      let payload = {};
      try {
        payload = await res.json();
      } catch (_err) {
        payload = {};
      }

      if (!res.ok || !payload || payload.ok !== true || !payload.invoice) {
        const errMsg =
          (payload && typeof payload.error === "string" && payload.error.trim()) ||
          "Invoice not found.";
        showError(errMsg);
        return;
      }

      const data = sanitizeInvoice(payload.invoice);
      if (!data) {
        showError("Invoice not found.");
        return;
      }

      const tenantPayment =
        payload.tenant_payment && typeof payload.tenant_payment === "object" ? payload.tenant_payment : {};
      const instrRaw = String(tenantPayment.payment_instructions || "").trim();
      const tenantPayLink = safeHttpUrl(tenantPayment.payment_link);
      const notesRaw = String(data.notes == null ? "" : data.notes);
      const hasWorkDetails = notesRaw.trim() !== "";

      const businessNameRaw = String(data.business_name || "").trim();
      const brandName = businessNameRaw || TENANT_NAME_FALLBACK;
      const brandNameEsc = escapeHtml(brandName);

      const status = normalizedStatus(data);
      const statusEsc = escapeHtml(status);
      const currency = String(data.currency != null && String(data.currency).trim() ? data.currency : "USD");
      const progressPct = paymentProgressPercent(data);
      const progressPctLabel = `${Math.round(progressPct)}%`;

      const facts = invoiceFacts(data);
      const canTryDynamicPay = Number(facts.balance || 0) > 0 && String(status || "").toLowerCase() !== "paid";
      const dynamicPayButton = canTryDynamicPay
        ? '<button class="btn btn-primary" type="button" id="btnInvoicePayNow">Pay Invoice</button>'
        : "";
      let paymentSectionHtml = "";
      if (instrRaw || tenantPayLink) {
        const headBlock = instrRaw
          ? '<div class="payment-panel-head">Payment Instructions</div>' +
            '<div class="payment-panel-body instructions">' +
            escapeHtml(instrRaw) +
            "</div>"
          : "";
        const secureCheckoutCopy =
          '<div class="payment-panel-body instructions" style="margin-top:10px;">' +
          escapeHtml(
            "Payments submitted through secure checkout are processed by Stripe and sent directly to Three Colors Corp."
          ) +
          "</div>";
        paymentSectionHtml =
          '<div class="payment-panel">' +
          headBlock +
          secureCheckoutCopy +
          '<div class="payment-actions">' +
          dynamicPayButton +
          "</div>" +
          '<div class="notice" id="invoicePayNotice" style="display:none;margin-top:12px;"></div>' +
          "</div>";
      } else {
        paymentSectionHtml =
          '<div class="payment-panel muted">' +
          (dynamicPayButton ? `<div class="payment-actions">${dynamicPayButton}</div>` : "") +
          '<p class="payment-placeholder">' +
          escapeHtml("Payment instructions will be provided by the contractor.") +
          "</p>" +
          '<div class="notice" id="invoicePayNotice" style="display:none;margin-top:12px;"></div>' +
          "</div>";
      }
      const contractTotal = money(facts.contractTotal, currency);
      const invoiceAmount = money(facts.invoiceAmount, currency);
      const paidAmount = money(facts.paid, currency);
      const balanceDue = money(facts.balance, currency);

      const accent = safeAccentColor(data.accent_color);
      const invLabelRaw = String(data.invoice_label || "").trim();
      const invoiceTitleBlock = invLabelRaw ? `<div class="header-title">${escapeHtml(invLabelRaw)}</div>` : "";
      const workDetailsHtml = hasWorkDetails
        ? '<div class="notes">' +
          '<div class="notes-title">Work Details</div>' +
          '<div class="notes-text">' +
          displayText(notesRaw) +
          "</div>" +
          "</div>"
        : "";

      document.documentElement.style.setProperty("--accent", accent);
      document.documentElement.style.setProperty("--accent-dark", accent);

      setDocumentTitle(businessNameRaw || "");

      invoiceBox.innerHTML =
        '<div class="topbar">' +
          '<div class="topbar-main brand">' +
            "<h1>" + brandNameEsc + "</h1>" +
            '<div class="sub">' + escapeHtml(BUSINESS_SUBTITLE) + "</div>" +
            invoiceTitleBlock +
          "</div>" +
          '<div class="topbar-right">' +
            '<div class="invoice-meta">' +
              '<span class="invoice-inline-label">Invoice</span>' +
              '<span class="invoice-inline-no">' + displayText(data.invoice_no, "Invoice") + "</span>" +
            "</div>" +
            '<div class="status-pill ' +
            escapeHtml(statusClassFromLabel(status)) +
            '">' +
            statusEsc +
            "</div>" +
          "</div>" +
        "</div>" +
        '<div class="content">' +
          '<div class="grid">' +
            '<div class="panel">' +
              '<div class="eyebrow">Customer</div>' +
              '<div class="info-list">' +
                '<div class="info-row">' +
                  '<div class="label">Name</div>' +
                  '<div class="value">' +
                  displayText(data.customer_name) +
                  "</div>" +
                "</div>" +
                '<div class="info-row">' +
                  '<div class="label">Email</div>' +
                  '<div class="value">' +
                  displayText(data.customer_email) +
                  "</div>" +
                "</div>" +
                '<div class="info-row">' +
                  '<div class="label">Project</div>' +
                  '<div class="value">' +
                  displayText(data.project_name) +
                  "</div>" +
                "</div>" +
              "</div>" +
            "</div>" +
            '<div class="panel">' +
              '<div class="eyebrow">Details</div>' +
              '<div class="info-list">' +
                '<div class="info-row">' +
                  '<div class="label">Issue Date</div>' +
                  '<div class="value">' +
                  displayText(data.issue_date) +
                  "</div>" +
                "</div>" +
                '<div class="info-row">' +
                  '<div class="label">Due Date</div>' +
                  '<div class="value">' +
                  displayText(data.due_date) +
                  "</div>" +
                "</div>" +
                '<div class="info-row">' +
                  '<div class="label">Type</div>' +
                  '<div class="value">' +
                  displayText(data.type, "service") +
                  "</div>" +
                "</div>" +
              "</div>" +
            "</div>" +
          "</div>" +
          workDetailsHtml +
          '<div class="summary">' +
            '<div class="summary-head">Summary</div>' +
            '<div class="summary-body">' +
              '<div class="sum-row">' +
                "<span>Contract total</span>" +
                "<strong>" +
                contractTotal +
                "</strong>" +
              "</div>" +
              '<div class="sum-row">' +
                "<span>Invoice amount</span>" +
                "<strong>" +
                invoiceAmount +
                "</strong>" +
              "</div>" +
              '<div class="sum-row">' +
                "<span>Paid to date</span>" +
                "<strong>" +
                paidAmount +
                "</strong>" +
              "</div>" +
              '<div class="sum-row total">' +
                "<span>Remaining balance</span>" +
                "<span>" +
                balanceDue +
                "</span>" +
              "</div>" +
              '<div class="progress-wrap">' +
                '<div class="progress-meta">' +
                  "<span>Payment progress</span>" +
                  "<span>" + escapeHtml(progressPctLabel) + "</span>" +
                "</div>" +
                '<div class="progress-track"><div class="progress-fill" style="width:' +
                escapeHtml(String(progressPct)) +
                '%;"></div></div>' +
                '<div class="last-payment">' +
                  "Last payment summary: " +
                  (facts.paid > 0
                    ? "Paid to date " + paidAmount + " on a contract total of " + contractTotal + "."
                    : "No payments recorded yet.") +
                "</div>" +
              "</div>" +
            "</div>" +
          "</div>" +
          '<div class="actions">' +
          '<button class="btn btn-secondary" type="button" onclick="window.print()">Print</button>' +
          "</div>" +
          paymentSectionHtml +
          '<p class="powered-by">Powered by Margin Guard</p>' +
        "</div>";

      const payBtn = document.getElementById("btnInvoicePayNow");
      if (payBtn) {
        payBtn.onclick = async function () {
          if (payBtn.dataset.pending === "1") return;
          try {
            payBtn.dataset.pending = "1";
            payBtn.disabled = true;
            payBtn.textContent = "Redirecting...";
            const r = await fetch("/.netlify/functions/create-invoice-checkout-session", {
              method: "POST",
              headers: { "Content-Type": "application/json", Accept: "application/json" },
              body: JSON.stringify({ public_token: String(token).trim() }),
            });
            const d = await r.json().catch(function () {
              return {};
            });
            if (r.ok && d && d.ok && d.checkout_url) {
              window.location.href = String(d.checkout_url);
              return;
            }
            if (tenantPayLink) {
              try {
                window.open(tenantPayLink, "_blank", "noopener,noreferrer");
              } catch (_openErr) {
                /* ignore and show notice below */
              }
              showPanelNotice("warn", "Secure checkout is temporarily unavailable. Redirecting to backup payment page.");
            } else {
              showPanelNotice("err", "Secure checkout is temporarily unavailable. Please contact the contractor.");
            }
          } catch (_err) {
            if (tenantPayLink) {
              try {
                window.open(tenantPayLink, "_blank", "noopener,noreferrer");
              } catch (_openErr) {
                /* ignore and show notice below */
              }
              showPanelNotice("warn", "Secure checkout is temporarily unavailable. Redirecting to backup payment page.");
            } else {
              showPanelNotice("err", "Secure checkout is temporarily unavailable. Please contact the contractor.");
            }
          } finally {
            payBtn.dataset.pending = "0";
            payBtn.disabled = false;
            payBtn.textContent = "Pay Invoice";
          }
        };
      }
      const paymentState = String(new URLSearchParams(window.location.search).get("payment") || "").trim();
      if (paymentState === "success") {
        showPanelNotice("ok", "Payment submitted successfully. We are confirming your invoice payment.");
      } else if (paymentState === "cancel") {
        showPanelNotice("warn", "Payment was canceled. Your invoice remains open.");
      }
    } catch (err) {
      showError(err && err.message ? err.message : "Unexpected error loading invoice.");
    }
  }

  loadInvoice();
})();
  </script>
</body>
</html>
