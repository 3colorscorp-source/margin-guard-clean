<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#0f8a5f;
      --accent-dark:#0b6b49;
      --soft:#f9fafb;
      --danger:#991b1b;
      --danger-bg:#fee2e2;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg, #f9fafb, #eef2f7);
      color:var(--text);
      padding:32px 16px;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(15,23,42,0.08);
    }

    .topbar{
      padding:24px 28px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      flex-wrap:wrap;
      background:#fff;
    }

    .brand h1{
      margin:0 0 6px;
      font-size:28px;
      letter-spacing:-0.03em;
    }

    .brand .sub{
      color:var(--muted);
      font-size:14px;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:10px 14px;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      border:1px solid var(--line);
      background:#f9fafb;
    }

    .status-pill.paid{
      color:#065f46;
      background:#ecfdf5;
      border-color:#a7f3d0;
    }

    .status-pill.partial,
    .status-pill.open{
      color:#92400e;
      background:#fffbeb;
      border-color:#fcd34d;
    }

    .status-pill.overdue{
      color:#991b1b;
      background:#fef2f2;
      border-color:#fecaca;
    }

    .content{
      padding:28px;
    }

    .hero{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:24px;
      margin-bottom:24px;
    }

    .panel{
      border:1px solid var(--line);
      border-radius:16px;
      padding:20px;
      background:var(--soft);
    }

    .eyebrow{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:10px;
    }

    .invoice-label-hero{
      font-size:clamp(22px, 4vw, 30px);
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.07em;
      line-height:1.12;
      margin:0 0 14px;
      color:#0f172a;
    }

    .invoice-no{
      font-size:32px;
      font-weight:800;
      margin:0 0 10px;
      line-height:1.05;
    }

    .big-amount{
      margin:0;
      font-size:40px;
      font-weight:800;
      line-height:1;
    }

    .small-note{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
      margin-bottom:24px;
    }

    .info-list{
      display:grid;
      gap:12px;
    }

    .info-row{
      display:grid;
      grid-template-columns:160px 1fr;
      gap:12px;
      padding-bottom:10px;
      border-bottom:1px dashed var(--line);
    }

    .info-row:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .label{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .value{
      font-size:15px;
      font-weight:600;
      word-break:break-word;
    }

    .summary{
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      margin-bottom:24px;
    }

    .summary-head{
      padding:16px 20px;
      background:#f9fafb;
      border-bottom:1px solid var(--line);
      font-size:15px;
      font-weight:800;
    }

    .summary-body{
      padding:18px 20px;
      display:grid;
      gap:12px;
      background:#fff;
    }

    .sum-row{
      display:flex;
      justify-content:space-between;
      gap:16px;
      font-size:15px;
    }

    .sum-row.total{
      padding-top:12px;
      margin-top:4px;
      border-top:1px solid var(--line);
      font-size:24px;
      font-weight:800;
    }

    .progress-wrap{
      margin-top:14px;
      padding-top:12px;
      border-top:1px dashed var(--line);
    }

    .progress-meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .progress-track{
      width:100%;
      height:10px;
      border-radius:999px;
      background:#e5e7eb;
      overflow:hidden;
    }

    .progress-fill{
      height:100%;
      width:0%;
      background:var(--accent);
      border-radius:999px;
      transition:width .25s ease;
    }

    .last-payment{
      margin-top:10px;
      font-size:13px;
      color:#374151;
      line-height:1.45;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:20px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:180px;
    }

    .btn-primary{
      background:var(--accent);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--accent-dark);
    }

    .btn-secondary{
      background:#fff;
      color:#111827;
      border:1px solid var(--line);
    }

    .notes{
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px 20px;
      background:#fff;
    }

    .notes-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:8px;
    }

    .notes-text{
      color:#374151;
      font-size:14px;
      line-height:1.6;
      white-space:pre-wrap;
    }

    .error{
      color:var(--danger);
      background:var(--danger-bg);
      padding:16px;
      border-radius:14px;
      font-weight:700;
      white-space:pre-wrap;
    }

    .powered-by{
      margin-top:20px;
      font-size:12px;
      opacity:0.65;
      text-align:center;
    }

    @media (max-width: 800px){
      .hero,
      .grid{
        grid-template-columns:1fr;
      }

      .info-row{
        grid-template-columns:1fr;
        gap:4px;
      }

      .content,
      .topbar{
        padding:20px;
      }

      .invoice-no{
        font-size:26px;
      }

      .big-amount{
        font-size:32px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="invoice">Loading...</div>
    </div>
  </div>

  <script>
(function () {
  const TENANT_NAME_FALLBACK = "Invoice";
  const BUSINESS_SUBTITLE = "Service invoice";
  const invoiceBox = document.getElementById("invoice");

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function safeHttpUrl(url) {
    const u = String(url || "").trim();
    return /^https?:\/\//i.test(u) ? u : "";
  }

  function safeAccentColor(hex) {
    const h = String(hex || "").trim();
    return /^#[0-9a-fA-F]{3,8}$/.test(h) ? h : "#0f8a5f";
  }

  function money(value, currency) {
    const cur = currency && String(currency).trim() ? String(currency).trim() : "USD";
    const num = Number(value);
    const n = Number.isFinite(num) ? num : 0;
    try {
      return new Intl.NumberFormat("en-US", { style: "currency", currency: cur }).format(n);
    } catch {
      return `$${n.toFixed(2)}`;
    }
  }

  function displayText(value, fallback) {
    const f = fallback === undefined ? "—" : fallback;
    if (value == null || value === "") return escapeHtml(f);
    return escapeHtml(String(value));
  }

  function invoiceFacts(inv) {
    const contractNum = Number(inv.contract_total);
    const invoiceAmountNum = Number(inv.invoice_amount != null ? inv.invoice_amount : inv.amount);
    const paidNum = Number(inv.paid_to_date != null ? inv.paid_to_date : inv.paid_amount);
    const balanceNum = Number(inv.remaining_balance != null ? inv.remaining_balance : inv.balance_due);
    const contractTotal = Number.isFinite(contractNum) ? contractNum : Number.isFinite(invoiceAmountNum) ? invoiceAmountNum : 0;
    const invoiceAmount = Number.isFinite(invoiceAmountNum) ? invoiceAmountNum : 0;
    const paid = Number.isFinite(paidNum) ? paidNum : 0;
    const balance = Number.isFinite(balanceNum) ? balanceNum : Math.max(contractTotal - paid, 0);
    return { contractTotal, invoiceAmount, paid, balance };
  }

  function normalizedStatus(inv) {
    const facts = invoiceFacts(inv);
    if (facts.balance <= 0) return "Paid";
    if (facts.paid > 0) return "Partial";
    const raw = String(inv.status || "").trim().toLowerCase();
    if (raw === "overdue" || raw === "expired") return "Overdue";
    const due = parseDateOnly(inv.due_date);
    if (due) {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      if (due.getTime() < today && facts.balance > 0) return "Overdue";
    }
    return "Open";
  }

  function statusClassFromLabel(label) {
    const s = String(label || "").toLowerCase();
    if (s === "paid") return "paid";
    if (s === "partial") return "partial";
    if (s === "overdue") return "overdue";
    return "open";
  }

  function parseDateOnly(value) {
    const s = String(value || "").trim();
    const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return null;
    const y = Number(m[1]);
    const mo = Number(m[2]) - 1;
    const d = Number(m[3]);
    if (!Number.isFinite(y) || !Number.isFinite(mo) || !Number.isFinite(d)) return null;
    return new Date(y, mo, d);
  }

  function paymentProgressPercent(inv) {
    const facts = invoiceFacts(inv);
    if (facts.contractTotal <= 0) return facts.paid > 0 ? 100 : 0;
    const pct = (facts.paid / facts.contractTotal) * 100;
    return Math.max(0, Math.min(100, Math.round(pct * 100) / 100));
  }

  function setDocumentTitle(brandName) {
    const t = String(brandName || "").trim();
    document.title = t ? `${t} — Invoice` : "Invoice";
  }

  function showError(message) {
    const msg = escapeHtml(message || "Something went wrong.");
    document.title = "Invoice";
    invoiceBox.innerHTML =
      '<div class="topbar">' +
        '<div class="brand">' +
          "<h1>" + escapeHtml(TENANT_NAME_FALLBACK) + "</h1>" +
          '<div class="sub">' + escapeHtml(BUSINESS_SUBTITLE) + "</div>" +
        "</div>" +
      "</div>" +
      '<div class="content">' +
        '<div class="error">' + msg + "</div>" +
      "</div>" +
      '<p class="powered-by" style="margin:20px 28px 24px;">Powered by Margin Guard</p>';
  }

  function sanitizeInvoice(raw) {
    if (!raw || typeof raw !== "object") return null;
    const o = { ...raw };
    delete o.tenant_id;
    return o;
  }

  async function loadInvoice() {
    try {
      const token = new URLSearchParams(window.location.search).get("token");
      if (!token || !String(token).trim()) {
        showError("Missing invoice token.");
        return;
      }

      const res = await fetch(
        "/.netlify/functions/get-public-invoice?token=" + encodeURIComponent(String(token).trim())
      );

      let payload = {};
      try {
        payload = await res.json();
      } catch (_err) {
        payload = {};
      }

      if (!res.ok || !payload || payload.ok !== true || !payload.invoice) {
        const errMsg =
          (payload && typeof payload.error === "string" && payload.error.trim()) ||
          "Invoice not found.";
        showError(errMsg);
        return;
      }

      const data = sanitizeInvoice(payload.invoice);
      if (!data) {
        showError("Invoice not found.");
        return;
      }

      const businessNameRaw = String(data.business_name || "").trim();
      const brandName = businessNameRaw || TENANT_NAME_FALLBACK;
      const brandNameEsc = escapeHtml(brandName);

      const status = normalizedStatus(data);
      const statusEsc = escapeHtml(status);
      const currency = String(data.currency != null && String(data.currency).trim() ? data.currency : "USD");
      const progressPct = paymentProgressPercent(data);
      const progressPctLabel = `${Math.round(progressPct)}%`;

      const facts = invoiceFacts(data);
      const contractTotal = money(facts.contractTotal, currency);
      const invoiceAmount = money(facts.invoiceAmount, currency);
      const paidAmount = money(facts.paid, currency);
      const balanceDue = money(facts.balance, currency);

      const accent = safeAccentColor(data.accent_color);
      const logoUrl = safeHttpUrl(data.logo_url);

      const invLabelRaw = String(data.invoice_label || "").trim();
      const invLabelBlock = invLabelRaw
        ? '<div class="invoice-label-hero">' + escapeHtml(invLabelRaw) + "</div>"
        : "";

      document.documentElement.style.setProperty("--accent", accent);
      document.documentElement.style.setProperty("--accent-dark", accent);

      setDocumentTitle(businessNameRaw || "");

      const logoBlock = logoUrl
        ? '<img src="' +
          escapeHtml(logoUrl) +
          '" alt="" style="max-height:44px;max-width:180px;display:block;margin-bottom:10px;" />'
        : "";

      invoiceBox.innerHTML =
        '<div class="topbar">' +
          '<div class="brand">' +
            logoBlock +
            "<h1>" + brandNameEsc + "</h1>" +
            '<div class="sub">' + escapeHtml(BUSINESS_SUBTITLE) + "</div>" +
          "</div>" +
          '<div class="status-pill ' +
          escapeHtml(statusClassFromLabel(status)) +
          '">' +
          statusEsc +
          "</div>" +
        "</div>" +
        '<div class="content">' +
          '<div class="hero">' +
            '<div class="panel">' +
              invLabelBlock +
              '<div class="eyebrow">Invoice</div>' +
              '<div class="invoice-no">' +
              displayText(data.invoice_no, "Invoice") +
              "</div>" +
              '<div class="small-note">Issued by ' +
              brandNameEsc +
              "</div>" +
            "</div>" +
            '<div class="panel">' +
              '<div class="eyebrow">Remaining balance</div>' +
              '<p class="big-amount">' +
              balanceDue +
              "</p>" +
              '<div class="small-note">Due date: ' +
              displayText(data.due_date) +
              "</div>" +
            "</div>" +
          "</div>" +
          '<div class="grid">' +
            '<div class="panel">' +
              '<div class="eyebrow">Customer</div>' +
              '<div class="info-list">' +
                '<div class="info-row">' +
                  '<div class="label">Name</div>' +
                  '<div class="value">' +
                  displayText(data.customer_name) +
                  "</div>" +
                "</div>" +
                '<div class="info-row">' +
                  '<div class="label">Email</div>' +
                  '<div class="value">' +
                  displayText(data.customer_email) +
                  "</div>" +
                "</div>" +
                '<div class="info-row">' +
                  '<div class="label">Project</div>' +
                  '<div class="value">' +
                  displayText(data.project_name) +
                  "</div>" +
                "</div>" +
              "</div>" +
            "</div>" +
            '<div class="panel">' +
              '<div class="eyebrow">Details</div>' +
              '<div class="info-list">' +
                '<div class="info-row">' +
                  '<div class="label">Issue Date</div>' +
                  '<div class="value">' +
                  displayText(data.issue_date) +
                  "</div>" +
                "</div>" +
                '<div class="info-row">' +
                  '<div class="label">Due Date</div>' +
                  '<div class="value">' +
                  displayText(data.due_date) +
                  "</div>" +
                "</div>" +
                '<div class="info-row">' +
                  '<div class="label">Type</div>' +
                  '<div class="value">' +
                  displayText(data.type, "service") +
                  "</div>" +
                "</div>" +
              "</div>" +
            "</div>" +
          "</div>" +
          '<div class="summary">' +
            '<div class="summary-head">Summary</div>' +
            '<div class="summary-body">' +
              '<div class="sum-row">' +
                "<span>Contract total</span>" +
                "<strong>" +
                contractTotal +
                "</strong>" +
              "</div>" +
              '<div class="sum-row">' +
                "<span>Invoice amount</span>" +
                "<strong>" +
                invoiceAmount +
                "</strong>" +
              "</div>" +
              '<div class="sum-row">' +
                "<span>Paid to date</span>" +
                "<strong>" +
                paidAmount +
                "</strong>" +
              "</div>" +
              '<div class="sum-row total">' +
                "<span>Remaining balance</span>" +
                "<span>" +
                balanceDue +
                "</span>" +
              "</div>" +
              '<div class="progress-wrap">' +
                '<div class="progress-meta">' +
                  "<span>Payment progress</span>" +
                  "<span>" + escapeHtml(progressPctLabel) + "</span>" +
                "</div>" +
                '<div class="progress-track"><div class="progress-fill" style="width:' +
                escapeHtml(String(progressPct)) +
                '%;"></div></div>' +
                '<div class="last-payment">' +
                  "Last payment summary: " +
                  (facts.paid > 0
                    ? "Paid to date " + paidAmount + " on a contract total of " + contractTotal + "."
                    : "No payments recorded yet.") +
                "</div>" +
              "</div>" +
            "</div>" +
          "</div>" +
          '<div class="actions">' +
          '<button class="btn btn-secondary" type="button" onclick="window.print()">Print</button>' +
          "</div>" +
          '<div class="notes">' +
          '<div class="notes-title">Notes</div>' +
          '<div class="notes-text">' +
          displayText(data.notes, "No notes added.") +
          "</div>" +
          "</div>" +
          '<p class="powered-by">Powered by Margin Guard</p>' +
        "</div>";
    } catch (err) {
      showError(err && err.message ? err.message : "Unexpected error loading invoice.");
    }
  }

  loadInvoice();
})();
  </script>
</body>
</html>
