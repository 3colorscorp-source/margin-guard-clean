<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public Invoice</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#0f8a5f;
      --accent-dark:#0b6b49;
      --soft:#f9fafb;
      --danger:#991b1b;
      --danger-bg:#fee2e2;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg, #f9fafb, #eef2f7);
      color:var(--text);
      padding:32px 16px;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(15,23,42,0.08);
    }

    .topbar{
      padding:24px 28px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      flex-wrap:wrap;
      background:#fff;
    }

    .brand h1{
      margin:0 0 6px;
      font-size:28px;
      letter-spacing:-0.03em;
    }

    .brand .sub{
      color:var(--muted);
      font-size:14px;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:10px 14px;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      border:1px solid var(--line);
      background:#f9fafb;
    }

    .status-pill.paid{
      color:#065f46;
      background:#ecfdf5;
      border-color:#a7f3d0;
    }

    .status-pill.partial,
    .status-pill.open{
      color:#92400e;
      background:#fffbeb;
      border-color:#fcd34d;
    }

    .status-pill.overdue{
      color:#991b1b;
      background:#fef2f2;
      border-color:#fecaca;
    }

    .content{
      padding:28px;
    }

    .hero{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:24px;
      margin-bottom:24px;
    }

    .panel{
      border:1px solid var(--line);
      border-radius:16px;
      padding:20px;
      background:var(--soft);
    }

    .eyebrow{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:10px;
    }

    .invoice-no{
      font-size:32px;
      font-weight:800;
      margin:0 0 10px;
      line-height:1.05;
    }

    .big-amount{
      margin:0;
      font-size:40px;
      font-weight:800;
      line-height:1;
    }

    .small-note{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
      margin-bottom:24px;
    }

    .info-list{
      display:grid;
      gap:12px;
    }

    .info-row{
      display:grid;
      grid-template-columns:160px 1fr;
      gap:12px;
      padding-bottom:10px;
      border-bottom:1px dashed var(--line);
    }

    .info-row:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .label{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .value{
      font-size:15px;
      font-weight:600;
      word-break:break-word;
    }

    .summary{
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      margin-bottom:24px;
    }

    .summary-head{
      padding:16px 20px;
      background:#f9fafb;
      border-bottom:1px solid var(--line);
      font-size:15px;
      font-weight:800;
    }

    .summary-body{
      padding:18px 20px;
      display:grid;
      gap:12px;
      background:#fff;
    }

    .sum-row{
      display:flex;
      justify-content:space-between;
      gap:16px;
      font-size:15px;
    }

    .sum-row.total{
      padding-top:12px;
      margin-top:4px;
      border-top:1px solid var(--line);
      font-size:24px;
      font-weight:800;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:20px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:180px;
    }

    .btn-primary{
      background:var(--accent);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--accent-dark);
    }

    .btn-secondary{
      background:#fff;
      color:#111827;
      border:1px solid var(--line);
    }

    .notes{
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px 20px;
      background:#fff;
    }

    .notes-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:8px;
    }

    .notes-text{
      color:#374151;
      font-size:14px;
      line-height:1.6;
      white-space:pre-wrap;
    }

    .error{
      color:var(--danger);
      background:var(--danger-bg);
      padding:16px;
      border-radius:14px;
      font-weight:700;
      white-space:pre-wrap;
    }

    @media (max-width: 800px){
      .hero,
      .grid{
        grid-template-columns:1fr;
      }

      .info-row{
        grid-template-columns:1fr;
        gap:4px;
      }

      .content,
      .topbar{
        padding:20px;
      }

      .invoice-no{
        font-size:26px;
      }

      .big-amount{
        font-size:32px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="invoice">Loading...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://yaagobzgozzozibublmj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_UTuO6wlERHBzoSnkySHATw_s6T46upe";
    const BUSINESS_NAME = "Three Colors Corp";
    const BUSINESS_SUBTITLE = "Service Invoice";
    const invoiceBox = document.getElementById("invoice");

    function money(value, currency = "USD") {
      const num = Number(value || 0);
      try {
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: currency || "USD"
        }).format(num);
      } catch {
        return `$${num.toFixed(2)}`;
      }
    }

    function safe(value, fallback = "—") {
      return value == null || value === "" ? fallback : value;
    }

    function statusClass(status) {
      const s = String(status || "").toLowerCase();
      if (s === "paid") return "paid";
      if (s === "partial" || s === "sent") return "partial";
      if (s === "overdue" || s === "expired") return "overdue";
      return "open";
    }

    function showError(message) {
      invoiceBox.innerHTML = `
        <div class="topbar">
          <div class="brand">
            <h1>${BUSINESS_NAME}</h1>
            <div class="sub">${BUSINESS_SUBTITLE}</div>
          </div>
        </div>
        <div class="content">
          <div class="error">${message}</div>
        </div>
      `;
    }

    async function loadInvoice() {
      try {
        if (!window.supabase || typeof window.supabase.createClient !== "function") {
          showError("Supabase library did not load correctly.");
          return;
        }

        const token = new URLSearchParams(window.location.search).get("token");
        if (!token) {
          showError("Missing invoice token.");
          return;
        }

        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data, error } = await client
          .from("invoices")
          .select("*")
          .eq("public_token", token)
          .single();

        if (error || !data) {
          showError("Invoice not found.");
          return;
        }

        const status = safe(data.status, "OPEN");
        const currency = safe(data.currency, "USD");
        const amount = money(data.amount, currency);
        const paidAmount = money(data.paid_amount, currency);
        const balanceDue = money(data.balance_due, currency);
        const brandName = safe(data.business_name, BUSINESS_NAME);
        const accent = safe(data.accent_color, "#0f8a5f");
        const logoUrl = data.logo_url || "";
        const payButton = data.payment_link
          ? `<a class="btn btn-primary" href="${data.payment_link}" target="_blank" rel="noopener noreferrer">Pay Now</a>`
          : `<button class="btn btn-secondary" type="button" onclick="alert('Payment link not available yet.')">Payment Link Pending</button>`;

        document.documentElement.style.setProperty("--accent", accent);
        document.documentElement.style.setProperty("--accent-dark", accent);

        invoiceBox.innerHTML = `
          <div class="topbar">
            <div class="brand">
              ${logoUrl ? `<img src="${logoUrl}" alt="Logo" style="max-height:44px; max-width:180px; display:block; margin-bottom:10px;" />` : ""}
              <h1>${brandName}</h1>
              <div class="sub">${BUSINESS_SUBTITLE}</div>
            </div>
            <div class="status-pill ${statusClass(status)}">${status}</div>
          </div>

          <div class="content">
            <div class="hero">
              <div class="panel">
                <div class="eyebrow">Invoice</div>
                <div class="invoice-no">${safe(data.invoice_no, "Invoice")}</div>
                <div class="small-note">Issued by ${brandName}</div>
              </div>

              <div class="panel">
                <div class="eyebrow">Balance Due</div>
                <p class="big-amount">${balanceDue}</p>
                <div class="small-note">Due date: ${safe(data.due_date)}</div>
              </div>
            </div>

            <div class="grid">
              <div class="panel">
                <div class="eyebrow">Customer</div>
                <div class="info-list">
                  <div class="info-row">
                    <div class="label">Name</div>
                    <div class="value">${safe(data.customer_name)}</div>
                  </div>
                  <div class="info-row">
                    <div class="label">Email</div>
                    <div class="value">${safe(data.customer_email)}</div>
                  </div>
                  <div class="info-row">
                    <div class="label">Project</div>
                    <div class="value">${safe(data.project_name)}</div>
                  </div>
                </div>
              </div>

              <div class="panel">
                <div class="eyebrow">Details</div>
                <div class="info-list">
                  <div class="info-row">
                    <div class="label">Issue Date</div>
                    <div class="value">${safe(data.issue_date)}</div>
                  </div>
                  <div class="info-row">
                    <div class="label">Due Date</div>
                    <div class="value">${safe(data.due_date)}</div>
                  </div>
                  <div class="info-row">
                    <div class="label">Type</div>
                    <div class="value">${safe(data.type, "service")}</div>
                  </div>
                  <div class="info-row">
                    <div class="label">Public Token</div>
                    <div class="value">${safe(data.public_token)}</div>
                  </div>
                </div>
              </div>
            </div>

            <div class="summary">
              <div class="summary-head">Summary</div>
              <div class="summary-body">
                <div class="sum-row">
                  <span>Total Amount</span>
                  <strong>${amount}</strong>
                </div>
                <div class="sum-row">
                  <span>Paid Amount</span>
                  <strong>${paidAmount}</strong>
                </div>
                <div class="sum-row total">
                  <span>Balance Due</span>
                  <span>${balanceDue}</span>
                </div>
              </div>
            </div>

            <div class="actions">
              ${payButton}
              <button class="btn btn-secondary" type="button" onclick="window.print()">Print</button>
            </div>

            <div class="notes">
              <div class="notes-title">Notes</div>
              <div class="notes-text">${safe(data.notes, "No notes added.")}</div>
            </div>
          </div>
        `;
      } catch (err) {
        showError(err.message || "Unexpected error loading invoice.");
      }
    }

    loadInvoice();
  </script>
</body>
</html>
