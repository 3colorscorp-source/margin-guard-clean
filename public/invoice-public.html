<!-- LOCKED STABLE FILE - ANTI-REGRESSION WARNING -->
<!-- Multi-tenant invoice visibility/payments behavior has been audited. -->
<!-- Owner approval is required before any modification to this file. -->
<!-- Public Work Details depends on invoices.notes and must remain intact. -->
<!-- Stripe checkout flow and Pay Invoice behavior are protected. -->
<!-- Any future change requires full regression testing of rendering, notes visibility, and payment paths. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#0f8a5f;
      --accent-dark:#0b6b49;
      --soft:#f9fafb;
      --danger:#991b1b;
      --danger-bg:#fee2e2;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:Inter, "Segoe UI", Arial, Helvetica, sans-serif;
      background:#eef2f6;
      color:var(--text);
      padding:32px 16px;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 12px 36px rgba(15,23,42,0.08);
    }

    .topbar{
      padding:24px 28px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
      background:#fff;
    }

    .topbar-main{
      min-width:220px;
      flex:1 1 auto;
    }

    .brand h1{
      margin:0;
      font-size:26px;
      letter-spacing:-0.02em;
      line-height:1.2;
    }

    .brand .sub{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
    }

    .brand-head{
      display:flex;
      align-items:flex-start;
      gap:14px;
    }

    .brand-mark{
      width:44px;
      height:44px;
      min-width:44px;
      min-height:44px;
      flex-shrink:0;
      border-radius:12px;
      object-fit:contain;
      background:#f3f4f6;
      border:1px solid var(--line);
    }

    .brand-mark--initials{
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:800;
      letter-spacing:.04em;
      color:#374151;
      background:linear-gradient(155deg,#f9fafb 0%,#eef2f7 100%);
    }

    .brand-copy{
      min-width:0;
      flex:1 1 auto;
    }

    .header-title{
      margin-top:8px;
      font-size:14px;
      font-weight:700;
      color:#1f2937;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:14px;
      flex-wrap:wrap;
    }

    .invoice-meta-top > span{
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.08em;
      padding-top:6px;
    }

    .invoice-meta-top > strong{
      font-size:24px;
      font-weight:800;
      line-height:1;
    }

    .invoice-meta{
      display:inline-flex;
      align-items:baseline;
      gap:8px;
    }

    .invoice-inline-label{
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .invoice-inline-no{
      font-size:26px;
      font-weight:800;
      line-height:1;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:10px 14px;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      border:1px solid var(--line);
      background:#f9fafb;
    }

    .status-pill.paid{
      color:#065f46;
      background:#ecfdf5;
      border-color:#a7f3d0;
    }

    .status-pill.partial,
    .status-pill.open{
      color:#92400e;
      background:#fffbeb;
      border-color:#fcd34d;
    }

    .status-pill.overdue{
      color:#991b1b;
      background:#fef2f2;
      border-color:#fecaca;
    }

    .content{
      padding:28px;
    }

    .panel{
      border:1px solid var(--line);
      border-radius:16px;
      padding:20px;
      background:#fff;
      box-shadow:0 1px 0 rgba(15,23,42,0.03);
    }

    .eyebrow{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:10px;
    }

    .small-note{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-bottom:24px;
    }

    .info-list{
      display:grid;
      gap:12px;
    }

    .info-row{
      display:grid;
      grid-template-columns:160px 1fr;
      gap:12px;
      padding-bottom:10px;
      border-bottom:1px dashed var(--line);
    }

    .info-row:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .label{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .value{
      font-size:15px;
      font-weight:600;
      word-break:break-word;
    }

    .summary{
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      margin-bottom:24px;
    }

    .summary-head{
      padding:16px 20px;
      background:#f9fafb;
      border-bottom:1px solid var(--line);
      font-size:15px;
      font-weight:800;
    }

    .summary-body{
      padding:18px 20px;
      display:grid;
      gap:12px;
      background:#fff;
    }

    .sum-row{
      display:flex;
      justify-content:space-between;
      gap:16px;
      font-size:15px;
    }

    .sum-row.total{
      padding-top:12px;
      margin-top:4px;
      border-top:1px solid var(--line);
      font-size:24px;
      font-weight:800;
    }

    .sum-subhead{
      margin-top:10px;
      padding-top:12px;
      border-top:1px dashed var(--line);
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
    }

    .progress-wrap{
      margin-top:14px;
      padding-top:12px;
      border-top:1px dashed var(--line);
    }

    .progress-meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .progress-track{
      width:100%;
      height:10px;
      border-radius:999px;
      background:#e5e7eb;
      overflow:hidden;
    }

    .progress-fill{
      height:100%;
      width:0%;
      background:var(--accent);
      border-radius:999px;
      transition:width .25s ease;
    }

    .last-payment{
      margin-top:10px;
      font-size:13px;
      color:#374151;
      line-height:1.45;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:20px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:180px;
    }

    .btn-primary{
      background:var(--accent);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--accent-dark);
    }

    .btn-secondary{
      background:#fff;
      color:#111827;
      border:1px solid var(--line);
    }

    .notes{
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px 20px;
      background:#fff;
      margin-bottom:24px;
    }

    .notes-title{
      font-size:17px;
      font-weight:800;
      margin-bottom:8px;
      letter-spacing:.02em;
      text-transform:uppercase;
    }

    .notes-text{
      color:#374151;
      font-size:14px;
      line-height:1.6;
      white-space:pre-wrap;
    }

    .payment-panel{
      border:1px solid var(--line);
      border-radius:16px;
      padding:22px 24px;
      margin-bottom:24px;
      background:linear-gradient(180deg,#fafbfc 0%,#fff 45%);
      box-shadow:0 1px 0 rgba(15,23,42,0.04);
    }

    .payment-panel-head{
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
      margin-bottom:12px;
    }

    .payment-panel-body.instructions{
      color:#1f2937;
      font-size:15px;
      line-height:1.65;
      white-space:pre-wrap;
      margin:0;
    }

    .payment-actions{
      margin-top:16px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }

    .payment-panel.muted{
      background:#f9fafb;
      border-style:dashed;
    }

    .payment-placeholder{
      color:var(--muted);
      font-size:14px;
      line-height:1.55;
      margin:0;
      font-style:italic;
    }

    .error{
      color:var(--danger);
      background:var(--danger-bg);
      padding:16px;
      border-radius:14px;
      font-weight:700;
      white-space:pre-wrap;
    }

    .powered-by{
      margin-top:20px;
      font-size:12px;
      opacity:0.65;
      text-align:center;
    }

    @media (max-width: 720px){
      .hero,
      .grid{
        grid-template-columns:1fr;
      }

      .info-row{
        grid-template-columns:1fr;
        gap:4px;
      }

      .content,
      .topbar{
        padding:20px;
      }

      .topbar{
        align-items:flex-start;
      }

      .topbar-right{
        width:100%;
        justify-content:space-between;
      }

      .payment-actions .btn{
        width:100%;
        min-width:0;
      }

      .invoice-inline-no{ font-size:22px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="invoice">Loading...</div>
    </div>
  </div>

  <script>
(function () {
  const TENANT_NAME_FALLBACK = "Invoice";
  const BUSINESS_SUBTITLE = "Service invoice";
  const invoiceBox = document.getElementById("invoice");

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function safeHttpUrl(url) {
    let s = String(url ?? "").trim();
    if (!s) return "";
    if (s.startsWith("//")) s = `https:${s}`;
    try {
      const u = new URL(s);
      if (u.protocol === "http:" || u.protocol === "https:") return u.href;
    } catch (_e) {
      if (/^https?:\/\//i.test(s)) return s;
    }
    return "";
  }

  function buildInitialsFromBusinessName(name) {
    const parts = String(name || "")
      .trim()
      .split(/\s+/)
      .filter(Boolean);
    if (!parts.length) return "MG";
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return `${parts[0][0] || ""}${parts[1][0] || ""}`.toUpperCase();
  }

  function buildBrandHeaderHtml(brandName, logoUrl) {
    const nameEsc = escapeHtml(brandName || TENANT_NAME_FALLBACK);
    const logoResolved = safeHttpUrl(logoUrl);
    const altText = escapeHtml(brandName || "Business logo");
    const mark = logoResolved
      ? `<img class="brand-mark" src="${escapeHtml(logoResolved)}" alt="${altText}" width="44" height="44" decoding="async" />`
      : `<div class="brand-mark brand-mark--initials" aria-hidden="true">${escapeHtml(buildInitialsFromBusinessName(brandName))}</div>`;
    return (
      '<div class="brand-head">' +
        mark +
        '<div class="brand-copy">' +
          "<h1>" + nameEsc + "</h1>" +
          '<div class="sub">' + escapeHtml(BUSINESS_SUBTITLE) + "</div>" +
        "</div>" +
      "</div>"
    );
  }

  function safeAccentColor(hex) {
    const h = String(hex || "").trim();
    return /^#[0-9a-fA-F]{3,8}$/.test(h) ? h : "#0f8a5f";
  }

  function money(value, currency) {
    const cur = currency && String(currency).trim() ? String(currency).trim() : "USD";
    const num = Number(value);
    const n = Number.isFinite(num) ? num : 0;
    try {
      return new Intl.NumberFormat("en-US", { style: "currency", currency: cur }).format(n);
    } catch {
      return `$${n.toFixed(2)}`;
    }
  }

  function displayText(value, fallback) {
    const f = fallback === undefined ? "—" : fallback;
    if (value == null || value === "") return escapeHtml(f);
    return escapeHtml(String(value));
  }

  /**
   * Strip internal linkage/metadata markers from client-facing Work Details.
   * Markers remain stored in DB; this is display-only.
   */
  function sanitizeClientFacingNotes(raw) {
    let s = String(raw == null ? "" : raw);
    s = s.replace(/\[source_invoice:[^\]]*\]/gi, "");
    s = s.replace(/\[invoice_type:[^\]]*\]/gi, "");
    s = s.replace(/\[mg_[a-z0-9_]+:[^\]]*\]/gi, "");
    s = s.replace(/[ \t]+\r?\n/g, "\n");
    s = s.replace(/\n{3,}/g, "\n\n");
    return s.trim();
  }

  const PROJECT_PAYMENT_LABELS = {
    "start payment": "Start Payment",
    "progress payment": "Progress Payment",
    "final payment": "Final Payment",
    "remaining balance": "Remaining Balance",
    "change order": "Change Order"
  };

  function normalizeProjectPaymentLabel(inv) {
    const raw = String(inv?.invoice_label || "").trim();
    const key = raw.toLowerCase();
    if (PROJECT_PAYMENT_LABELS[key]) return PROJECT_PAYMENT_LABELS[key];
    return raw || "Progress Payment";
  }

  function isMaterialCostInvoice(inv) {
    const label = String(inv?.invoice_label || "").trim();
    if (label.toLowerCase() === "material cost") return true;
    return String(inv?.notes || "").includes("[invoice_type:unexpected_material_cost]");
  }

  function isProjectPaymentInvoice(inv) {
    if (isMaterialCostInvoice(inv)) return false;
    const label = String(inv?.invoice_label || "").trim().toLowerCase();
    if (PROJECT_PAYMENT_LABELS[label]) return true;
    const notes = String(inv?.notes || "");
    if (
      !/\[source_invoice:[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}\]/i.test(
        notes
      )
    ) {
      return false;
    }
    if (notes.includes("[invoice_type:unexpected_material_cost]")) return false;
    return true;
  }

  function isPartialBalanceDueInvoice(inv) {
    if (isMaterialCostInvoice(inv)) return false;
    if (isProjectPaymentInvoice(inv)) return false;
    const contractNum = Number(inv.contract_total);
    const invoiceAmountNum = Number(inv.invoice_amount != null ? inv.invoice_amount : inv.amount);
    const paidNum = Number(inv.paid_to_date != null ? inv.paid_to_date : inv.paid_amount);
    const balanceNum = Number(inv.remaining_balance != null ? inv.remaining_balance : inv.balance_due);
    const contractTotal = Number.isFinite(contractNum) ? contractNum : Number.isFinite(invoiceAmountNum) ? invoiceAmountNum : 0;
    const invoiceAmount = Number.isFinite(invoiceAmountNum) ? invoiceAmountNum : 0;
    const paid = Number.isFinite(paidNum) ? paidNum : 0;
    const balance = Number.isFinite(balanceNum) ? balanceNum : Math.max(contractTotal - paid, 0);
    if (paid <= 0.005) return false;
    if (balance <= 0.005) return false;
    const totalRef = Math.max(contractTotal, invoiceAmount);
    if (totalRef <= balance + 0.005) return false;
    return true;
  }

  /** Project payment facts — ledger paid only; never invent paid as contract − invoice. */
  function projectPaymentInvoiceFacts(inv) {
    const projectContractTotalNum = Number(inv.contract_total);
    const invoiceAmountNum = Number(inv.invoice_amount != null ? inv.invoice_amount : inv.amount);
    const invoiceBalanceDueNum = Number(inv.balance_due);
    const projectContractTotal = Number.isFinite(projectContractTotalNum) ? projectContractTotalNum : 0;
    const invoiceAmount = Number.isFinite(invoiceAmountNum) ? invoiceAmountNum : 0;
    let invoiceBalanceDue = Number.isFinite(invoiceBalanceDueNum)
      ? Math.max(invoiceBalanceDueNum, 0)
      : Math.max(invoiceAmount - Number(inv.paid_amount || 0), 0);
    let projectPaidToDate = Number(inv.paid_to_date != null ? inv.paid_to_date : 0);
    if (!Number.isFinite(projectPaidToDate) || projectPaidToDate < 0) projectPaidToDate = 0;
    const remainingBeforeInvoice = Math.max(
      Math.round((projectContractTotal - projectPaidToDate) * 100) / 100,
      0
    );
    const projectedRemainingAfter = Math.max(
      Math.round((remainingBeforeInvoice - invoiceAmount) * 100) / 100,
      0
    );
    return {
      invoiceLabel: normalizeProjectPaymentLabel(inv),
      projectContractTotal,
      projectPaidToDate,
      remainingProjectBalance: remainingBeforeInvoice,
      remainingBeforeInvoice,
      projectedRemainingAfter,
      invoiceAmount,
      invoiceBalanceDue
    };
  }

  function invoiceFacts(inv) {
    if (isMaterialCostInvoice(inv)) {
      const invoiceAmountNum = Number(inv.invoice_amount != null ? inv.invoice_amount : inv.amount);
      const paidNum = Number(inv.paid_amount);
      const balanceNum = Number(inv.balance_due);
      const invoiceAmount = Number.isFinite(invoiceAmountNum) ? invoiceAmountNum : 0;
      const paid = Number.isFinite(paidNum) ? paidNum : 0;
      const balance = Number.isFinite(balanceNum)
        ? balanceNum
        : Math.max(invoiceAmount - paid, 0);
      return {
        variant: "material_cost",
        contractTotal: invoiceAmount,
        invoiceAmount,
        paid,
        balance
      };
    }
    if (isProjectPaymentInvoice(inv)) {
      const pp = projectPaymentInvoiceFacts(inv);
      return {
        variant: "project_payment",
        invoiceLabel: pp.invoiceLabel,
        contractTotal: pp.projectContractTotal,
        invoiceAmount: pp.invoiceAmount,
        paid: pp.projectPaidToDate,
        balance: pp.invoiceBalanceDue,
        projectContractTotal: pp.projectContractTotal,
        projectPaidToDate: pp.projectPaidToDate,
        remainingProjectBalance: pp.remainingBeforeInvoice,
        remainingBeforeInvoice: pp.remainingBeforeInvoice,
        projectedRemainingAfter: pp.projectedRemainingAfter
      };
    }
    const contractNum = Number(inv.contract_total);
    const invoiceAmountNum = Number(inv.invoice_amount != null ? inv.invoice_amount : inv.amount);
    const paidNum = Number(inv.paid_to_date != null ? inv.paid_to_date : inv.paid_amount);
    const balanceNum = Number(inv.remaining_balance != null ? inv.remaining_balance : inv.balance_due);
    const contractTotal = Number.isFinite(contractNum) ? contractNum : Number.isFinite(invoiceAmountNum) ? invoiceAmountNum : 0;
    const invoiceAmount = Number.isFinite(invoiceAmountNum) ? invoiceAmountNum : 0;
    const paid = Number.isFinite(paidNum) ? paidNum : 0;
    const balance = Number.isFinite(balanceNum) ? balanceNum : Math.max(contractTotal - paid, 0);
    if (isPartialBalanceDueInvoice(inv)) {
      return {
        variant: "partial_balance_due",
        contractTotal,
        invoiceAmount,
        paid,
        balance
      };
    }
    return { variant: "standard", contractTotal, invoiceAmount, paid, balance };
  }

  function normalizedStatus(inv) {
    const facts = invoiceFacts(inv);
    if (facts.balance <= 0) return "Paid";
    if (facts.paid > 0) return "Partial";
    const raw = String(inv.status || "").trim().toLowerCase();
    if (raw === "overdue" || raw === "expired") return "Overdue";
    const due = parseDateOnly(inv.due_date);
    if (due) {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      if (due.getTime() < today && facts.balance > 0) return "Overdue";
    }
    return "Open";
  }

  function statusClassFromLabel(label) {
    const s = String(label || "").toLowerCase();
    if (s === "paid") return "paid";
    if (s === "partial") return "partial";
    if (s === "overdue") return "overdue";
    return "open";
  }

  function parseDateOnly(value) {
    const s = String(value || "").trim();
    const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return null;
    const y = Number(m[1]);
    const mo = Number(m[2]) - 1;
    const d = Number(m[3]);
    if (!Number.isFinite(y) || !Number.isFinite(mo) || !Number.isFinite(d)) return null;
    return new Date(y, mo, d);
  }

  function paymentProgressPercent(inv) {
    const facts = invoiceFacts(inv);
    if (facts.contractTotal <= 0) return facts.paid > 0 ? 100 : 0;
    const pct = (facts.paid / facts.contractTotal) * 100;
    return Math.max(0, Math.min(100, Math.round(pct * 100) / 100));
  }

  function setDocumentTitle(brandName) {
    const t = String(brandName || "").trim();
    document.title = t ? `${t} — Invoice` : "Invoice";
  }

  function showError(message) {
    const msg = escapeHtml(message || "Something went wrong.");
    document.title = "Invoice";
    invoiceBox.innerHTML =
      '<div class="topbar">' +
        '<div class="brand">' +
          "<h1>" + escapeHtml(TENANT_NAME_FALLBACK) + "</h1>" +
          '<div class="sub">' + escapeHtml(BUSINESS_SUBTITLE) + "</div>" +
        "</div>" +
      "</div>" +
      '<div class="content">' +
        '<div class="error">' + msg + "</div>" +
      "</div>" +
      '<p class="powered-by" style="margin:20px 28px 24px;">Powered by Margin Guard</p>';
  }

  function sanitizeInvoice(raw) {
    if (!raw || typeof raw !== "object") return null;
    const o = { ...raw };
    delete o.tenant_id;
    return o;
  }

  function showPanelNotice(kind, message) {
    const node = document.getElementById("invoicePayNotice");
    if (!node) return;
    node.style.display = "block";
    node.className = `notice ${kind || ""}`.trim();
    node.textContent = String(message || "");
  }

  async function loadInvoice() {
    try {
      const token = new URLSearchParams(window.location.search).get("token");
      if (!token || !String(token).trim()) {
        showError("Missing invoice token.");
        return;
      }

      const res = await fetch(
        "/.netlify/functions/get-public-invoice?token=" + encodeURIComponent(String(token).trim())
      );

      let payload = {};
      try {
        payload = await res.json();
      } catch (_err) {
        payload = {};
      }

      if (!res.ok || !payload || payload.ok !== true || !payload.invoice) {
        const errMsg =
          (payload && typeof payload.error === "string" && payload.error.trim()) ||
          "Invoice not found.";
        showError(errMsg);
        return;
      }

      const data = sanitizeInvoice(payload.invoice);
      if (!data) {
        showError("Invoice not found.");
        return;
      }

      const tenantPayment =
        payload.tenant_payment && typeof payload.tenant_payment === "object" ? payload.tenant_payment : {};
      const instrRaw = String(tenantPayment.payment_instructions || "").trim();
      const instrClean = instrRaw
        .split(/\r?\n/)
        .map((line) => {
          const t = String(line || "").trim();
          if (
            /Payments for labor, materials, approved change orders, deposits, or remaining project balances can be submitting Checks payable to:/i.test(
              t
            )
          ) {
            return "Payments for labor, materials, approved change orders, deposits, or remaining project balances can be submitted by check payable to Three Colors Corp.";
          }
          return line;
        })
        .filter((line) => {
          const t = String(line || "").trim();
          return (
            t !== "Payments submitted through the payment link are processed securely through Stripe and sent directly to Three Colors Corp." &&
            t !== "Please follow the contractor's payment instructions above to complete payment."
          );
        })
        .join("\n")
        .trim();
      const tenantPayLink = safeHttpUrl(tenantPayment.payment_link);
      const businessAddressRaw = String(data.business_address || "").trim();
      const businessEmailRaw = String(data.business_email || "").trim();
      const businessPhoneRaw = String(data.business_phone || "").trim();
      const notesRaw = sanitizeClientFacingNotes(data.notes == null ? "" : data.notes);
      const hasWorkDetails = notesRaw.length > 0;

      const businessNameRaw = String(data.business_name || "").trim();
      const brandName = businessNameRaw || TENANT_NAME_FALLBACK;

      const status = normalizedStatus(data);
      const statusEsc = escapeHtml(status);
      const currency = String(data.currency != null && String(data.currency).trim() ? data.currency : "USD");
      const progressPct = paymentProgressPercent(data);
      const progressPctLabel = `${Math.round(progressPct)}%`;

      const facts = invoiceFacts(data);
      let paymentSectionHtml = "";
      if (instrClean || tenantPayLink) {
        const headBlock = instrClean
          ? '<div class="payment-panel-head">Payment Instructions</div>' +
            '<div class="payment-panel-body instructions">' +
            escapeHtml(instrClean) +
            "</div>"
          : "";
        const mailingBlock = businessAddressRaw
          ? '<div class="payment-panel-body instructions" style="margin-top:10px;">' +
            "<strong>Checks payable to:</strong><br>" +
            escapeHtml(brandName) +
            "<br><br><strong>Mail payment to:</strong><br>" +
            escapeHtml(businessAddressRaw) +
            "</div>"
          : "";
        const contactLines = [businessEmailRaw, businessPhoneRaw].filter(Boolean);
        const contactBlock = contactLines.length
          ? '<div class="payment-panel-body instructions" style="margin-top:10px;">' +
            "<strong>For payment questions:</strong><br>" +
            contactLines.map((line) => escapeHtml(line)).join("<br>") +
            "</div>"
          : "";
        paymentSectionHtml =
          '<div class="payment-panel">' +
          headBlock +
          mailingBlock +
          contactBlock +
          '<div class="notice" id="invoicePayNotice" style="display:none;margin-top:12px;"></div>' +
          "</div>";
      } else {
        paymentSectionHtml =
          '<div class="payment-panel muted">' +
          '<p class="payment-placeholder">' +
          escapeHtml("Payment instructions will be provided by the contractor.") +
          "</p>" +
          '<div class="notice" id="invoicePayNotice" style="display:none;margin-top:12px;"></div>' +
          "</div>";
      }
      const contractTotal = money(facts.contractTotal, currency);
      const invoiceAmount = money(facts.invoiceAmount, currency);
      const paidAmount = money(facts.paid, currency);
      const balanceDue = money(facts.balance, currency);
      const materialCostInvoice = facts.variant === "material_cost";
      const projectPaymentInvoice = facts.variant === "project_payment";
      const partialBalanceDueInvoice = facts.variant === "partial_balance_due";
      const projectContractTotal = money(facts.projectContractTotal, currency);
      const projectPaidToDate = money(facts.projectPaidToDate, currency);
      const remainingProjectBalance = money(facts.remainingProjectBalance, currency);
      const projectedRemainingAfter = money(facts.projectedRemainingAfter, currency);
      const invoiceTypeLabel = escapeHtml(String(facts.invoiceLabel || "Progress Payment"));
      let summaryRowsHtml = "";
      if (projectPaymentInvoice) {
        summaryRowsHtml =
          '<div class="sum-row">' +
            "<span>Invoice type</span>" +
            "<strong>" + invoiceTypeLabel + "</strong>" +
          "</div>" +
          '<div class="sum-row">' +
            "<span>This invoice amount</span>" +
            "<strong>" + invoiceAmount + "</strong>" +
          "</div>" +
          '<div class="sum-row total">' +
            "<span>Amount due on this invoice</span>" +
            "<span>" + balanceDue + "</span>" +
          "</div>" +
          '<div class="sum-subhead">Project payment summary</div>' +
          '<div class="sum-row">' +
            "<span>Project contract total</span>" +
            "<strong>" + projectContractTotal + "</strong>" +
          "</div>" +
          '<div class="sum-row">' +
            "<span>Project paid to date</span>" +
            "<strong>" + projectPaidToDate + "</strong>" +
          "</div>" +
          '<div class="sum-row">' +
            "<span>Remaining project balance before this invoice</span>" +
            "<strong>" + remainingProjectBalance + "</strong>" +
          "</div>" +
          '<div class="sum-row">' +
            "<span>Projected remaining balance after this invoice if paid</span>" +
            "<strong>" + projectedRemainingAfter + "</strong>" +
          "</div>";
      } else if (partialBalanceDueInvoice) {
        summaryRowsHtml =
          '<div class="sum-row total">' +
            "<span>Amount due on this invoice</span>" +
            "<span>" + balanceDue + "</span>" +
          "</div>" +
          '<div class="sum-subhead">Payment summary</div>' +
          '<div class="sum-row">' +
            "<span>Invoice total</span>" +
            "<strong>" + contractTotal + "</strong>" +
          "</div>" +
          '<div class="sum-row">' +
            "<span>Paid to date</span>" +
            "<strong>" + paidAmount + "</strong>" +
          "</div>" +
          '<div class="sum-row">' +
            "<span>Remaining balance</span>" +
            "<strong>" + balanceDue + "</strong>" +
          "</div>";
      } else {
        const summaryContractLabel = materialCostInvoice ? "Material cost invoice" : "Contract total";
        const summaryPaidLabel = materialCostInvoice
          ? "Paid to date on this invoice"
          : "Paid to date";
        const summaryBalanceLabel = materialCostInvoice
          ? "Amount due on this invoice"
          : "Remaining balance";
        summaryRowsHtml =
          '<div class="sum-row">' +
            "<span>" + escapeHtml(summaryContractLabel) + "</span>" +
            "<strong>" + contractTotal + "</strong>" +
          "</div>" +
          (materialCostInvoice
            ? ""
            : '<div class="sum-row">' +
              "<span>Invoice amount</span>" +
              "<strong>" + invoiceAmount + "</strong>" +
              "</div>") +
          '<div class="sum-row">' +
            "<span>" + escapeHtml(summaryPaidLabel) + "</span>" +
            "<strong>" + paidAmount + "</strong>" +
          "</div>" +
          '<div class="sum-row total">' +
            "<span>" + escapeHtml(summaryBalanceLabel) + "</span>" +
            "<span>" + balanceDue + "</span>" +
          "</div>";
      }
      const progressSummaryText =
        facts.paid > 0
          ? materialCostInvoice
            ? "Paid to date " + paidAmount + " on this material cost invoice."
            : projectPaymentInvoice
              ? "Project paid to date " + projectPaidToDate + " on a project contract total of " + projectContractTotal + "."
              : partialBalanceDueInvoice
                ? "Payment summary: " + paidAmount + " has been paid toward this " + contractTotal + " invoice."
                : "Paid to date " + paidAmount + " on a contract total of " + contractTotal + "."
          : "No payments recorded yet.";

      const accent = safeAccentColor(data.accent_color);
      const invLabelRaw = String(data.invoice_label || "").trim();
      const invoiceTitleBlock = invLabelRaw ? `<div class="header-title">${escapeHtml(invLabelRaw)}</div>` : "";
      const workDetailsHtml =
        '<div class="notes">' +
        '<div class="notes-title">WORK DETAILS</div>' +
        '<div class="notes-text">' +
        (hasWorkDetails
          ? displayText(notesRaw)
          : escapeHtml("Work details were not provided for this invoice.")) +
        "</div>" +
        "</div>";

      document.documentElement.style.setProperty("--accent", accent);
      document.documentElement.style.setProperty("--accent-dark", accent);

      setDocumentTitle(businessNameRaw || "");

      invoiceBox.innerHTML =
        '<div class="topbar">' +
          '<div class="topbar-main brand">' +
            buildBrandHeaderHtml(brandName, data.logo_url) +
            invoiceTitleBlock +
          "</div>" +
          '<div class="topbar-right">' +
            '<div class="invoice-meta">' +
              '<span class="invoice-inline-label">Invoice</span>' +
              '<span class="invoice-inline-no">' + displayText(data.invoice_no, "Invoice") + "</span>" +
            "</div>" +
            '<div class="status-pill ' +
            escapeHtml(statusClassFromLabel(status)) +
            '">' +
            statusEsc +
            "</div>" +
          "</div>" +
        "</div>" +
        '<div class="content">' +
          '<div class="grid">' +
            '<div class="panel">' +
              '<div class="eyebrow">Customer</div>' +
              '<div class="info-list">' +
                '<div class="info-row">' +
                  '<div class="label">Name</div>' +
                  '<div class="value">' +
                  displayText(data.customer_name) +
                  "</div>" +
                "</div>" +
                '<div class="info-row">' +
                  '<div class="label">Email</div>' +
                  '<div class="value">' +
                  displayText(data.customer_email) +
                  "</div>" +
                "</div>" +
                '<div class="info-row">' +
                  '<div class="label">Project</div>' +
                  '<div class="value">' +
                  displayText(data.project_name) +
                  "</div>" +
                "</div>" +
              "</div>" +
            "</div>" +
            '<div class="panel">' +
              '<div class="eyebrow">Details</div>' +
              '<div class="info-list">' +
                '<div class="info-row">' +
                  '<div class="label">Issue Date</div>' +
                  '<div class="value">' +
                  displayText(data.issue_date) +
                  "</div>" +
                "</div>" +
                '<div class="info-row">' +
                  '<div class="label">Due Date</div>' +
                  '<div class="value">' +
                  displayText(data.due_date) +
                  "</div>" +
                "</div>" +
                '<div class="info-row">' +
                  '<div class="label">Type</div>' +
                  '<div class="value">' +
                  displayText(data.type, "service") +
                  "</div>" +
                "</div>" +
              "</div>" +
            "</div>" +
          "</div>" +
          workDetailsHtml +
          '<div class="summary">' +
            '<div class="summary-head">Summary</div>' +
            '<div class="summary-body">' +
              summaryRowsHtml +
              '<div class="progress-wrap">' +
                '<div class="progress-meta">' +
                  "<span>Payment progress</span>" +
                  "<span>" + escapeHtml(progressPctLabel) + "</span>" +
                "</div>" +
                '<div class="progress-track"><div class="progress-fill" style="width:' +
                escapeHtml(String(progressPct)) +
                '%;"></div></div>' +
                '<div class="last-payment">' +
                  "Last payment summary: " +
                  progressSummaryText +
                "</div>" +
              "</div>" +
            "</div>" +
          "</div>" +
          '<div class="actions">' +
          '<button class="btn btn-secondary" type="button" onclick="window.print()">Print</button>' +
          "</div>" +
          paymentSectionHtml +
          '<p class="powered-by">Powered by Margin Guard</p>' +
        "</div>";

    } catch (err) {
      showError(err && err.message ? err.message : "Unexpected error loading invoice.");
    }
  }

  loadInvoice();
})();
  </script>
</body>
</html>
