<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estimate Proposal</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#f4f6f8;
    }

    .card {
      max-width:900px;
      margin:40px auto;
      background:white;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 20px 50px rgba(0,0,0,0.08);
    }

    .hero {
      background:#0f172a;
      color:white;
      padding:40px;
    }

    .hero h1 {
      margin:0;
      font-size:34px;
    }

    .section {
      padding:30px 40px;
      border-top:1px solid #eee;
    }

    .title {
      font-size:12px;
      color:#64748b;
      margin-bottom:10px;
      text-transform:uppercase;
    }

    .value {
      font-size:18px;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .box {
      background:#f8fafc;
      padding:18px;
      border-radius:12px;
      border:1px solid #e2e8f0;
    }

    .money {
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:14px;
    }

    .total {
      background:#0f172a;
      color:white;
      padding:24px;
      border-radius:14px;
    }

    .deposit {
      background:#f8fafc;
      padding:24px;
      border-radius:14px;
    }

    .big {
      font-size:38px;
      font-weight:bold;
    }

    .scope {
      background:#fcfcfd;
      padding:20px;
      border-radius:12px;
      border:1px solid #e5e7eb;
      white-space:pre-line;
    }

    .btn {
      display:inline-block;
      margin-top:20px;
      padding:16px 28px;
      background:#2563eb;
      color:white;
      border-radius:999px;
      font-weight:bold;
      text-decoration:none;
      border:none;
      cursor:pointer;
    }

    .center {
      text-align:center;
    }
  </style>
</head>

<body>

<div id="app">Loading...</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(async function(){

  function getVar(...names){
    for(let n of names){
      if(window[n]) return window[n];
    }
    return null;
  }

  // 🔥 FIX REAL AQUÍ
  const SUPABASE_URL =
    getVar("SUPABASE_URL","VITE_SUPABASE_URL") ||
    window.APP_CONFIG?.SUPABASE_URL;

  const SUPABASE_KEY =
    getVar("SUPABASE_ANON_KEY","VITE_SUPABASE_ANON_KEY") ||
    window.APP_CONFIG?.SUPABASE_ANON_KEY;

  if(!SUPABASE_URL || !SUPABASE_KEY){
    document.getElementById("app").innerHTML = `
      <div style="text-align:center;margin-top:100px;">
        <h2>Config error</h2>
        <p>Supabase keys not detected (config.js mismatch)</p>
      </div>
    `;
    return;
  }

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const token = params.get("t");

  if(!id || !token){
    document.getElementById("app").innerHTML = "Invalid link";
    return;
  }

  const { data } = await supabase
    .from("quotes")
    .select("*")
    .eq("id", id)
    .eq("public_token", token)
    .single();

  if(!data){
    document.getElementById("app").innerHTML = "Quote not found";
    return;
  }

  const q = data;

  const format = n =>
    new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(n||0);

  const scope =
    q.scope_summary ||
    q.scope_of_work ||
    "";

  document.getElementById("app").innerHTML = `
    <div class="card">

      <div class="hero">
        <h1>${q.project_name || "Project"}</h1>
        <p>Hi ${q.client_name || "Client"}</p>
      </div>

      <div class="section">
        <div class="title">Project Info</div>

        <div class="grid">
          <div class="box">
            <div class="title">Estimate</div>
            <div class="value">${q.estimate_no || q.id}</div>
          </div>

          <div class="box">
            <div class="title">Job Site</div>
            <div class="value">${q.job_site || ""}</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="title">Investment</div>

        <div class="money">
          <div class="total">
            <div>Total</div>
            <div class="big">${format(q.total)}</div>
          </div>

          <div class="deposit">
            <div>Deposit</div>
            <div class="big">${format(q.deposit_required)}</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="title">Scope of Work</div>
        <div class="scope">${scope || "Scope to be confirmed"}</div>
      </div>

      <div class="section center">
        <button class="btn" id="approveBtn">
          Approve Project & Pay Deposit
        </button>
      </div>

    </div>
  `;

  document.getElementById("approveBtn").onclick = async ()=>{
    await supabase
      .from("quotes")
      .update({status:"ACCEPTED"})
      .eq("id", id);

    if(q.payment_link){
      window.location.href = q.payment_link;
    } else {
      alert("Approved. Contact contractor for payment.");
    }
  };

})();
</script>

</body>
</html>
