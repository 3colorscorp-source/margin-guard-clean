<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Margin Guard | Supervisor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-requires-auth="true">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="logo" aria-hidden="true"><b>MG</b></div>
        <div>
          <h1>Margin Guard</h1>
          <p id="planStatus">Validando suscripcion...</p>
        </div>
      </div>
      <div class="actions">
        <a class="btn" href="dashboard.html">Dashboard</a>
        <a class="btn" href="owner.html">Dueno</a>
        <a class="btn" href="sales.html">Vendedor</a>
        <a class="btn active" href="supervisor.html">Supervisor</a>
        <a class="btn" href="sales-admin.html">Sales Admin</a>
        <button class="btn" id="btnManagePlan">Gestionar plan</button>
        <button class="btn danger" id="btnLogout">Cerrar sesion</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="account-pill" id="accountEmail">Cuenta activa</div>
    <div class="grid">
      <div class="card">
        <div class="card-inner">
          <h2>Control de proyecto (supervisor)</h2>
          <div class="sub">Solo presupuesto operativo: labor y materiales.</div>
          <div class="form">
            <div class="field"><label>Proyecto</label><input id="supProjectName" maxlength="60" /></div>
            <div class="field"><label>Horas planeadas</label><input id="supPlannedHours" type="number" step="0.25" /></div>
            <div class="field"><label>Presupuesto de labor</label><input id="supLaborBudget" type="number" step="0.01" /></div>
            <div class="field"><label>Presupuesto de materiales</label><input id="supMaterialBudget" type="number" step="0.01" /></div>
            <div class="field"><label>Fecha comprometida</label><input id="supDueDate" type="date" /></div>
            <div class="field"><label>Fecha proyectada final</label><input id="supProjectedDate" type="date" /></div>
          </div>
          <div class="sep"></div>
          <div class="badge green" id="supStatus">Controlado</div>
        </div>
      </div>

      <div class="card">
        <div class="card-inner">
          <h2>KPI supervisor</h2>
          <div class="kpi" id="supervisorKpis"></div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:14px;">
      <div class="card-inner">
        <h2>Registro diario / semanal de gastos</h2>
        <div class="form">
          <div class="field"><label>Fecha</label><input id="supEntryDate" type="date" /></div>
          <div class="field"><label>Labor ejecutada</label><input id="supEntryLabor" type="number" step="0.01" /></div>
          <div class="field"><label>Material comprado</label><input id="supEntryMaterial" type="number" step="0.01" /></div>
          <div class="field"><label>Nota</label><input id="supEntryNote" maxlength="100" placeholder="Semana 3: ajuste de tuberia" /></div>
        </div>
        <div class="actions" style="justify-content:flex-start; margin-top:10px;">
          <button class="btn primary" id="btnAddSupEntry">Agregar registro</button>
        </div>
        <div style="margin-top:12px;">
          <table class="table">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Nota</th>
                <th>Labor</th>
                <th>Material</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="supEntriesBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
